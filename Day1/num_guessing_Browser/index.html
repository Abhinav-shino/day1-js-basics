<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Guess the Number</h1>
        <p class="subtitle">I'm thinking of a number between 1 and 10</p>

        <p class="attempts" id="attempts">Attempts: 0 / 10</p>
        <p class="status" id="status">Click Start to begin!</p>

        <div class="input-group">
            <input type="number" id="guessInput" min="1" max="10" placeholder="Enter guess" disabled>
            <button class="btn" id="submitBtn" onclick="submitGuess()" disabled>Guess</button>
        </div>

        <button class="btn" id="startBtn" onclick="startGame()">Start Game</button>

        <div class="history" id="history"></div>
    </div>
    <script src="num.js"></script>
</body>
</html>
